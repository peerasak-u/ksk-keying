<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f6f7fb" />
<title>คอนโซล KSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header id="header">
  <button id="nav-btn" type="button" class="icon-btn" aria-label="เมนู"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg></button>
  <h1>คอนโซล KSK</h1>
  <span id="engine-badge" class="badge">…</span>
</header>

<main id="main">
  <section id="view-tasks" class="view">
    <div id="pane-run-empty" class="empty-hint" hidden>ยังไม่มีการรัน</div>

    <div id="board" class="board" hidden>
      <div class="lane lane--queue">
        <div class="lane-head">
          <span class="lane-title">รอคิว</span>
          <span id="queue-count" class="lane-count"></span>
        </div>
        <div id="queue-list" class="lane-cards"></div>
      </div>

      <div class="lane lane--progress">
        <div class="lane-head">
          <span class="lane-title">กำลังทำงาน</span>
          <span id="progress-count" class="lane-count"></span>
        </div>
        <div id="running-container" class="lane-cards"></div>
      </div>

      <div class="lane lane--end">
        <div class="lane-head">
          <span class="lane-title">เสร็จสิ้น</span>
          <span id="end-count" class="lane-count"></span>
        </div>
        <div id="history-list" class="lane-cards"></div>
      </div>
    </div>
  </section>

  <section id="view-customers" class="view" hidden>
    <p id="run-helper" class="helper-text">รันได้ทีละ 1 ลูกค้าเท่านั้น</p>
    <div id="client-tree"></div>
    <div id="confirm-bar" class="confirm-bar" hidden>
      <span id="confirm-label" class="confirm-label"></span>
      <button id="run-btn" type="button" class="btn btn-primary"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg> เริ่มงาน</button>
    </div>
  </section>
</main>

<script src="/app.js"></script>
</body>
</html>
