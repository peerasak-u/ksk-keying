<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f6f7fb" />
<title>คอนโซล KSK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header id="header">
  <button id="nav-btn" type="button" class="icon-btn" aria-label="เมนู">☰</button>
  <h1>คอนโซล KSK</h1>
  <span id="engine-badge" class="badge">…</span>
</header>

<main id="main">
  <section id="view-tasks" class="view">
    <div id="pane-run-empty" class="empty-hint" hidden>ยังไม่มีการรัน</div>

    <section id="section-running" class="run-section" hidden>
      <h2>กำลังทำงาน</h2>
      <div id="running-container"></div>
    </section>

    <section id="section-queue" class="run-section" hidden>
      <h2 id="queue-heading">รอคิว</h2>
      <div id="queue-list"></div>
    </section>

    <section id="section-history" class="run-section" hidden>
      <h2>ประวัติ</h2>
      <div id="history-list"></div>
    </section>
  </section>

  <section id="view-customers" class="view" hidden>
    <p id="run-helper" class="helper-text">รันได้ทีละ 1 ลูกค้าเท่านั้น</p>
    <div id="client-tree"></div>
    <div id="confirm-bar" class="confirm-bar" hidden>
      <span id="confirm-label" class="confirm-label"></span>
      <button id="run-btn" type="button" class="btn btn-primary">▶ เริ่มงาน</button>
    </div>
  </section>
</main>

<script src="/app.js"></script>
</body>
</html>
